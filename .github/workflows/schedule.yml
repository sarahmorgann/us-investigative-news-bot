name: Post National Investigative News

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python news_bot.py
        env:
          BB_URL: ${{ secrets.BB_URL }}
          BB_USER: ${{ secrets.BB_USER }}
          BB_PASS: ${{ secrets.BB_PASS }}
